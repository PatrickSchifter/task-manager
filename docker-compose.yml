version: "3.1"

services:
  db:
    container_name: task-manager-postgres
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: task-manager
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data:
  redis-data:
